<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Track - Kenyan Underground Rap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #222;
    }

    nav h1 {
      letter-spacing: 2px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 32px;
    }

    form {
      background: #111;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: 0 auto;
      border: 1px solid #222;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
    }

    button {
      background: #fff;
      color: #000;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #222;
      color: #777;
    }
  </style>
</head>
<body>

<nav>
  <h1>KE UNDERGROUND RAP</h1>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="artists.html">Artists</a></li>
    <li><a href="music.html">Music</a></li>
    <li><a href="submit.html">Submit Track</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="container">
  <h2>Submit Your Track</h2>
  <form action="#" method="post">
    <label for="artist-name">Artist Name</label>
    <input type="text" id="artist-name" name="artist-name" required>

    <label for="track-title">Track Title</label>
    <input type="text" id="track-title" name="track-title" required>

    <label for="genre">Genre</label>
    <select id="genre" name="genre" required>
      <option value="">Select Genre</option>
      <option value="drill">Drill</option>
      <option value="gengetone">Gengetone</option>
      <option value="alt-hiphop">Alt Hip Hop</option>
      <option value="hardcore">Hardcore Rap</option>
    </select>

    <label for="track-file">Upload Track (optional)</label>
    <input type="file" id="track-file" name="track-file" accept="audio/*">

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" required></textarea>

    <button type="submit">Submit Track</button>
  </form>
</div>

<footer>
  © 2026 Kenyan Underground Rap — Built for the culture 🇰🇪
</footer>

</body>
</html>
